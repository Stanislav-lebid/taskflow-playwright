version: "3.9"

services:
  db:
    image: postgres:15
    container_name: taskflow_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow
      POSTGRES_DB: taskflow
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
